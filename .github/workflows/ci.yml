name: Ifá-Lang CI (Aiye Matrix)

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════
  # OPON CHECK - Cross-platform Build & Test
  # ═══════════════════════════════════════════════════════════════════════════════
  opon-check:
    name: Opon (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      # 1. Format & Lint (Ìwà Pẹ̀lẹ́)
      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Clippy Lints
        run: cargo clippy --workspace --all-targets -- -D warnings

      # 2. Build Core
      - name: Build Workspace
        run: cargo build --workspace --verbose

      # 3. Test Core & Standard Library
      - name: Run Standard Tests
        run: cargo test --workspace --verbose

      # 4. Cross-Runtime Test
      - name: Run Cross-Runtime Tests
        run: cargo test -p ifa-embedded --test cross_runtime

  # ═══════════════════════════════════════════════════════════════════════════════
  # AIYE CHECK - Specialized Environments
  # ═══════════════════════════════════════════════════════════════════════════════
  aiye-embedded:
    name: Embedded (Thumbv7em)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
      
      - name: Verify Embedded Build (no_std)
        run: cargo build -p ifa-embedded --target thumbv7em-none-eabihf

  aiye-wasm:
    name: WASM (Browser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      
      - name: Verify WASM Build
        run: cargo build -p ifa-wasm --target wasm32-unknown-unknown

  # ═══════════════════════════════════════════════════════════════════════════════
  # PERFORMANCE CHECK
  # ═══════════════════════════════════════════════════════════════════════════════
  bench-check:
    name: Benchmark Sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      
      # Ensure benchmarks compile (don't run full suite)
      - name: Check Benchmarks
        run: cargo bench --no-run
